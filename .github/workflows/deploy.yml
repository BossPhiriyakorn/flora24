# Build บน GitHub Actions แล้ว deploy ไป EC2 (ไม่บิ้วบน AWS เพื่อประหยัดทรัพยากร)
# ตั้งค่า Secrets: Settings → Secrets and variables → Actions
#   - SSH_PRIVATE_KEY  (private key สำหรับ SSH เข้า EC2)
#   - EC2_HOST         (IP หรือ hostname ของ EC2)
#   - EC2_USER         (user SSH เช่น ubuntu, ec2-user)
# เลือกได้: DEPLOY_PATH (path บนเซิร์ฟเวอร์ เช่น /var/www/flora ค่าเริ่มต้นคือ /var/www/flora)

name: Build and Deploy to EC2

# รันเฉพาะเมื่อกด Run workflow ในแท็บ Actions (ไม่รันอัตโนมัติเมื่อ push)
on:
  workflow_dispatch:

env:
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/var/www/flora' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone output
        run: |
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/
          if [ -d public ]; then cp -r public .next/standalone/; fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            .next/standalone/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ env.DEPLOY_PATH }}/standalone/

      - name: Restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd ${{ env.DEPLOY_PATH }}/standalone && (pm2 restart all || (pm2 start server.js --name flora && pm2 save))"
        continue-on-error: true
